<p-toast></p-toast>
<div class="p-4 md:p-6">
  <p-card header="Contact Support & Feedback">
    <p class="m-0 mb-4 text-color-secondary">
      Found a bug or have an idea for a new feature? Let us know!
    </p>

    <form [formGroup]="supportForm" (ngSubmit)="onSubmit()">
      <div class="formgrid grid">
        <div class="field col-12 md:col-6">
          <label for="name">Your Name</label>
          <input id="name" type="text" pInputText formControlName="name" class="w-full" />
        </div>
        <div class="field col-12 md:col-6">
          <label for="email">Your Email</label>
          <input id="email" type="email" pInputText formControlName="email" class="w-full" />
        </div>
        <div class="field col-12">
          <label for="type">Submission Type</label>
          <p-select id="type" [options]="submissionTypes" formControlName="type"
                      placeholder="Select a type" styleClass="w-full"></p-select>
        </div>
        <div class="field col-12">
          <label for="description">Description</label>
          <p-editor formControlName="description" [style]="{ 'height': '200px' }"></p-editor>
        </div>
      </div>
      <div class="flex justify-content-end mt-4">
        <p-button label="Submit Feedback" type="submit" icon="pi pi-send"></p-button>
      </div>
    </form>
  </p-card>
</div>
