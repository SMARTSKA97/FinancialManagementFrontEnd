<form [formGroup]="budgetForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-2 p-fluid">
    <app-form-field label="Category" inputId="transactionCategoryId"
        [control]="budgetForm.get('transactionCategoryId')">
        <p-select formControlName="transactionCategoryId" [options]="categories()" optionLabel="name" optionValue="id"
            placeholder="Select Category (Optional for General)" appendTo="body" id="transactionCategoryId">
        </p-select>
    </app-form-field>

    <app-form-field label="Budget Amount" inputId="amount" [control]="budgetForm.get('amount')">
        <p-inputNumber formControlName="amount" mode="currency" currency="INR" locale="en-US" placeholder="0.00"
            id="amount">
        </p-inputNumber>
    </app-form-field>

    <app-form-field label="Period" inputId="period" [control]="budgetForm.get('period')">
        <p-select formControlName="period" [options]="periods" optionLabel="label" optionValue="value" id="period">
        </p-select>
    </app-form-field>

    <app-form-field label="Start Date" inputId="startDate" [control]="budgetForm.get('startDate')">
        <p-datepicker formControlName="startDate" [showIcon]="true" appendTo="body" id="startDate">
        </p-datepicker>
    </app-form-field>

    <app-form-field label="End Date (Optional)" inputId="endDate" [control]="budgetForm.get('endDate')">
        <p-datepicker formControlName="endDate" [showIcon]="true" appendTo="body" id="endDate">
        </p-datepicker>
    </app-form-field>

    <div class="flex justify-content-end gap-2 mt-2">
        <p-button label="Cancel" icon="pi pi-times" severity="secondary" type="button" (click)="ref.close()"></p-button>
        <p-button label="Save Budget" icon="pi pi-check" type="submit" [loading]="isSubmitting()"></p-button>
    </div>
</form>
