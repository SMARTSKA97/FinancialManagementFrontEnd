<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>

<div class="p-4">
    @if (backLinkPath) {
    <div class="mb-4">
        <a [routerLink]="backLinkPath" class="no-underline">
            <p-button [label]="'Back to ' + title.replace('s', '')" icon="pi pi-arrow-left"
                class="p-button-text"></p-button>
        </a>
    </div>
    }
    <p-card [header]="title">
        <ng-template pTemplate="header">
            <div class="flex justify-content-end gap-2">
                <p-button [label]="'New ' + title.slice(0, -1)" icon="pi pi-plus" (onClick)="showForm()"></p-button>
            </div>
        </ng-template>

        <app-data-table [data]="(items$ | async) || []" [columns]="columns" [loading]="isLoading$ | async">
            <ng-template #actions let-item>
                <div class="flex gap-2 justify-content-end">
                    <p-button icon="pi pi-pencil" text="true" rounded="true" (onClick)="showForm(item)"></p-button>
                    <p-button icon="pi pi-trash" text="true" rounded="true" severity="danger"
                        (onClick)="deleteItem(item)"></p-button>
                </div>
            </ng-template>
        </app-data-table>

    </p-card>
</div>
