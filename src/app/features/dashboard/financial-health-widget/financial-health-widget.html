<p-card header="Financial Health" styleClass="h-full shadow-2 overflow-hidden">
    @if (health(); as h) {
    <div class="flex flex-column align-items-center gap-4">
        <!-- Custom SVG Gauge -->
        <div class="gauge-container relative flex justify-content-center">
            <svg width="200" height="120" viewBox="0 0 200 120">
                <!-- Background Track -->
                <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#e2e8f0" stroke-width="12"
                    stroke-linecap="round" />

                <!-- Colored Segments (Simplified Gradient) -->
                <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="url(#gaugeGradient)" stroke-width="12"
                    stroke-linecap="round" />

                <defs>
                    <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#ef4444" />
                        <stop offset="50%" style="stop-color:#f59e0b" />
                        <stop offset="100%" style="stop-color:#10b981" />
                    </linearGradient>
                </defs>

                <!-- Needle -->
                <line x1="100" y1="100" x2="100" y2="40" stroke="#1e293b" stroke-width="3" stroke-linecap="round"
                    [style.transform]="'rotate(' + needleRotation() + 'deg)'"
                    style="transform-origin: 100px 100px; transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);" />

                <!-- Pivot -->
                <circle cx="100" cy="100" r="6" fill="#1e293b" />
            </svg>

            <div class="absolute bottom-0 text-center" style="transform: translateY(-20px);">
                <div class="text-4xl font-bold line-height-1">{{ score() }}</div>
                <div class="text-sm font-medium uppercase mt-1" [class]="statusClass()">{{ h.status }}</div>
            </div>
        </div>

        <!-- Metrics Summary -->
        <div class="flex w-full justify-content-around border-top-1 surface-border pt-3 mt-2">
            <div class="text-center">
                <div class="text-xs text-secondary font-medium uppercase mb-1">Savings</div>
                <div class="font-bold text-sm">{{ h.savingsRate | percent:'1.0-1' }}</div>
            </div>
            <div class="text-center">
                <div class="text-xs text-secondary font-medium uppercase mb-1">Budgets</div>
                <div class="font-bold text-sm">{{ h.budgetAdherence | percent:'1.0-1' }}</div>
            </div>
        </div>

        <!-- Insights List -->
        <div class="w-full flex flex-column gap-2 mt-2">
            @for (insight of h.insights; track insight.message) {
            <div class="insight-item p-2 border-round flex align-items-start gap-2" [ngClass]="{
                 'bg-blue-50 text-blue-700': insight.type === 'info',
                 'bg-green-50 text-green-700': insight.type === 'success',
                 'bg-orange-50 text-orange-700': insight.type === 'warning'
               }">
                <i class="pi" [ngClass]="{
                 'pi-info-circle': insight.type === 'info',
                 'pi-check-circle': insight.type === 'success',
                 'pi-exclamation-triangle': insight.type === 'warning'
               }" style="font-size: 0.9rem; margin-top: 2px;"></i>
                <span class="text-xs line-height-2">{{ insight.message }}</span>
            </div>
            }
        </div>
    </div>
    } @else {
    <div class="flex flex-column gap-3">
        <div class="h-8rem border-round surface-100 flex align-items-center justify-content-center">
            <i class="pi pi-spin pi-spinner text-4xl text-300"></i>
        </div>
        <div class="h-2rem border-round surface-100"></div>
        <div class="h-2rem border-round surface-100"></div>
    </div>
    }
</p-card>
