<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>

<div class="transactions-page p-4">
  <!-- FILTER BAR (GitLab style + Local Signals) -->
  <div class="filter-bar mb-4 flex flex-wrap align-items-center gap-3">
    <div class="flex align-items-center gap-2 mr-auto">
      <p-button label="Back to Accounts" icon="pi pi-arrow-left" severity="secondary" [outlined]="true"
        routerLink="/app/accounts"></p-button>
      <p-button label="New Transaction" icon="pi pi-plus" (onClick)="showTransactionForm()"
        severity="primary"></p-button>
    </div>

    <div class="flex align-items-center gap-2">
      <label class="font-semibold text-sm">Period</label>
      <p-datepicker [ngModel]="selectedDate()" view="month" dateFormat="mm/yy" (ngModelChange)="onDateChange($event)"
        placeholder="Select Month" [showIcon]="true" [style]="{'width': '12rem'}"></p-datepicker>
    </div>

    <div class="flex align-items-center gap-1">
      <p-iconfield>
        <p-inputicon class="pi pi-search"></p-inputicon>
        <input pInputText type="text" name="transactionSearch" autocomplete="off" [ngModel]="globalSearch()"
          (ngModelChange)="globalSearch.set($event)" (keyup.enter)="onSearch()" placeholder="Search..."
          class="w-15rem p-inputtext-sm" />
      </p-iconfield>
      <p-button icon="pi pi-search" [text]="true" severity="primary" size="small" (onClick)="onSearch()"
        pTooltip="Run Search"></p-button>
      @if (globalSearch()) {
      <p-button icon="pi pi-times" [text]="true" severity="secondary" size="small" (onClick)="clearSearch()"
        pTooltip="Clear Search"></p-button>
      }
    </div>

    <div class="flex align-items-center gap-2">
      <label class="font-semibold text-sm">Category</label>
      <p-select [options]="categoryOptions()" [ngModel]="selectedCategory()"
        (ngModelChange)="selectedCategory.set($event); onCategoryChange()" optionLabel="label" optionValue="value"
        placeholder="All Categories" [showClear]="true" [style]="{'min-width': '12rem'}" class="p-inputtext-sm">
      </p-select>
    </div>
  </div>

  <!-- SUMMARY CARDS (Stat Card Style) -->
  @if(summary()) {
  <div class="grid mb-4">
    <div class="col-12 sm:col-6 lg:col-3">
      <app-stat-card label="B/F Amount" [value]="((summary()?.broughtForwardAmount || 0) | currency:'INR')!"
        icon="pi pi-history" iconColor="var(--orange-500)" secondaryValue="Opening balance for this month">
      </app-stat-card>
    </div>
    <div class="col-12 sm:col-6 lg:col-3">
      <app-stat-card label="Closing Balance" [value]="(summary()?.currentBalance | currency:'INR')!" icon="pi pi-wallet"
        iconColor="var(--blue-500)"></app-stat-card>
    </div>
    <div class="col-12 sm:col-6 lg:col-3">
      <app-stat-card label="Monthly Income" [value]="(summary()?.totalIncome | currency:'INR')!" icon="pi pi-arrow-up"
        iconColor="var(--green-500)"></app-stat-card>
    </div>
    <div class="col-12 sm:col-6 lg:col-3">
      <app-stat-card label="Monthly Expenses" [value]="(summary()?.totalExpenses | currency:'INR')!"
        icon="pi pi-arrow-down" iconColor="var(--red-500)"></app-stat-card>
    </div>
  </div>
  }
    </div>
  </div>
  }
