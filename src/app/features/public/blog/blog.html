<section class="px-4 py-8 md:px-8 max-w-5xl mx-auto">
    <div class="text-center mb-6">
        <h1 class="text-4xl md:text-5xl font-bold mb-3 zoom-in"
            style="background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
            Blog</h1>
        <p class="text-lg" style="color: var(--text-muted);">Tips, guides, and updates from the Financial Planner team.
        </p>
    </div>

    <!-- Sort toggle -->
    <div class="flex justify-content-end mb-4">
        <button (click)="toggleSort()"
            class="flex align-items-center gap-2 px-3 py-2 border-round-lg cursor-pointer font-semibold text-sm transition-all transition-duration-200"
            style="background: var(--surface-section); border: 1px solid var(--surface-border); color: var(--text-color);">
            <i class="pi" [class.pi-sort-amount-down]="!sortAscending()"
                [class.pi-sort-amount-up]="sortAscending()"></i>
            {{ sortAscending() ? 'Oldest First' : 'Newest First' }}
        </button>
    </div>

    <div class="grid">
        @for(post of sortedPosts(); track post.id) {
        <div class="col-12 md:col-6 p-3">
            <a [routerLink]="['/blog', post.id]" class="no-underline text-color block h-full">
                <div
                    class="glass-card p-5 border-round-2xl h-full cursor-pointer hover:shadow-4 transition-all transition-duration-300">
                    <span class="inline-block text-xs font-bold px-2 py-1 border-round-lg mb-3"
                        [style.background]="post.tagColor" style="color: white;">{{ post.tag }}</span>
                    <h3 class="text-xl font-bold mb-2">{{ post.title }}</h3>
                    <p style="color: var(--text-muted);" class="line-height-3">{{ post.excerpt }}</p>
                    <div class="flex align-items-center mt-4 gap-2 text-sm" style="color: var(--text-muted);">
                        <i class="pi pi-calendar"></i>
                        <span>{{ post.date }}</span>
                        <span class="ml-auto flex align-items-center gap-1 font-semibold text-primary">Read More <i
                                class="pi pi-arrow-right text-xs"></i></span>
                    </div>
                </div>
            </a>
        </div>
        }
    </div>
</section>
