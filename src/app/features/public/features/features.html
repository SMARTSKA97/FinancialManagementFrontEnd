<section class="px-4 py-8 md:px-8 max-w-6xl mx-auto">
    <div class="text-center mb-6">
        <h1 class="text-4xl md:text-5xl font-bold mb-3 zoom-in"
            style="background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
            Powerful Features</h1>
        <p class="text-lg" style="color: var(--text-muted); max-width: 550px; margin: 0 auto;">Everything you need to
            master your personal finances, built with care.</p>
    </div>

    <div class="grid">
        @for(feature of featureList; track feature.title) {
        <div class="col-12 md:col-6 lg:col-4 p-3">
            <div class="glass-card p-5 border-round-2xl h-full">
                <i [class]="feature.icon + ' text-4xl mb-3'" [style.color]="feature.color"></i>
                <h3 class="text-xl font-bold mb-2">{{ feature.title }}</h3>
                <p style="color: var(--text-muted);">{{ feature.description }}</p>
            </div>
        </div>
        }
    </div>
</section>
