<p-toast></p-toast>
<div class="flex justify-content-center align-items-center h-screen">
  <p-card header="Login" [style]="{width: '360px'}">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="flex flex-column gap-2">
        <label for="username">Username</label>
        <input id="username" type="text" pInputText formControlName="userName" class="w-full" />
        @if (loginForm.get('userName')?.invalid && loginForm.get('userName')?.touched) {
        <small class="p-error">Username is required.</small>
        }
      </div>
      <div class="flex flex-column gap-2">
        <div>
          <label for="password">Password</label>
        </div>
        <div class="flex">
          <p-password id="password" formControlName="password" [feedback]="false" [toggleMask]="true"></p-password>
          @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <small class="p-error">Password is required.</small>
          }
        </div>
      </div>
      <div class="flex gap-2 justify-content-center align-items-center">
        <p-button label="Login" type="submit" [disabled]="loginForm.invalid"></p-button>
      </div>
      <div class="flex gap-2 justify-content-center align-items-center">
        <div class="mt-3 text-center">
          <a routerLink="/register">Don't have an account? Register</a>
        </div>
      </div>
    </form>
  </p-card>
</div>
