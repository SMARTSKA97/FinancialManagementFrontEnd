<div class="flex justify-content-center align-items-center h-screen">
  <p-card header="Login" [style]="{width: '360px'}">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="flex flex-column gap-2">
        <label for="username">Username</label>
        <input id="username" type="text" pInputText formControlName="userName" class="w-full" />
        <small class="p-error block mt-2">
          {{ validationService.getErrorMessage(loginForm.get('userName')) }}
        </small>
      </div>
      <div class="flex flex-column gap-2">
        <div>
          <label for="password">Password</label>
        </div>
        <div class="flex flex-column">
          <p-password id="password" formControlName="password" [feedback]="false" [toggleMask]="true"
            styleClass="w-full" inputStyleClass="w-full"></p-password>
          <small class="p-error block mt-2">
            {{ validationService.getErrorMessage(loginForm.get('password')) }}
          </small>
        </div>
      </div>
      <div class="flex gap-2 justify-content-center align-items-center">
        <p-button label="Login" type="submit" [disabled]="loginForm.invalid"></p-button>
      </div>
      <div class="flex gap-2 justify-content-center align-items-center">
        <div class="mt-3 text-center">
          <a routerLink="/register">Don't have an account? Register</a>
        </div>
      </div>
    </form>
  </p-card>
</div>

<p-dialog header="Concurrent Login Detected" [(visible)]="showConcurrentLoginModal" [modal]="true"
  [style]="{width: '400px'}" [closable]="false">
  <p class="m-0">
    You are already logged in on another device. Do you want to continue here? This will log you out from the other
    device.
  </p>
  <ng-template pTemplate="footer">
    <p-button icon="pi pi-times" (click)="cancelForceLogin()" label="Cancel" severity="danger"></p-button>
    <p-button icon="pi pi-check" (click)="confirmForceLogin()" label="Continue Here" severity="success"></p-button>
  </ng-template>
</p-dialog>
