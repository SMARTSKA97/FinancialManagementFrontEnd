<div class="flex justify-content-center align-items-center h-screen">
  <p-card header="Login" [style]="{width: '360px'}">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" pInputText formControlName="userName" class="w-full" />
      </div>
      <div class="field mt-3">
        <label for="password">Password</label>
        <p-password id="password" formControlName="password" [feedback]="false" class="w-full"></p-password>
      </div>
      <p-button label="Login" type="submit" class="w-full mt-4" [disabled]="loginForm.invalid"></p-button>
      <div class="mt-3 text-center">
        <a routerLink="/register">Don't have an account? Register</a>
      </div>
    </form>
  </p-card>
</div>
