<form [formGroup]="accountForm" (ngSubmit)="onSubmit()" class="p-4">
  <app-form-field label="Account Name" inputId="name" [control]="accountForm.get('name')">
    <input id="name" type="text" pInputText formControlName="name" class="w-full" />
  </app-form-field>

  <app-form-field label="Starting Balance" inputId="balance" [control]="accountForm.get('balance')">
    <p-inputNumber id="balance" formControlName="balance" mode="currency" currency="INR" locale="en-IN"
      class="w-full"></p-inputNumber>
  </app-form-field>

  <app-form-field label="Category" inputId="accountCategory" [control]="accountForm.get('accountCategoryId')">
    <p-select id="accountCategory" [options]="accountCategories()" formControlName="accountCategoryId"
      optionLabel="name" optionValue="id" [showClear]="true" placeholder="Select or type to add" class="w-full"
      appendTo="body" [filter]="true" (onFilter)="filterCategories($event)">
      <ng-template pTemplate="footer">
        @if (isNewCategory()) {
        <div class="p-2 border-top-1 surface-border">
          <p-button label="Create '{{ currentFilter() }}'" class="p-button-link"
            (onClick)="addNewCategory()"></p-button>
        </div>
        }
      </ng-template>
    </p-select>
  </app-form-field>

  <div class="flex justify-content-end mt-4 gap-2">
    <p-button label="Cancel" severity="secondary" (onClick)="ref.close()" [disabled]="isSubmitting()"></p-button>
    <p-button label="Save" type="submit" class="ml-2" [disabled]="accountForm.invalid || isSubmitting()"
      [loading]="isSubmitting()"></p-button>
  </div>
</form>
