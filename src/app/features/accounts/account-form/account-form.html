<form [formGroup]="accountForm" (ngSubmit)="onSubmit()" class="p-4">
  <div class="field">
    <label for="name">Account Name</label>
    <input id="name" type="text" pInputText formControlName="name" class="w-full" />
  </div>

  <div class="field mt-3">
    <label for="balance">Starting Balance</label>
    <p-inputNumber id="balance" formControlName="balance" mode="currency" currency="INR" locale="en-IN" class="w-full"></p-inputNumber>
  </div>

  <div class="field mt-3">
    <label for="accountCategory">Category</label>
    <p-select id="accountCategory" [options]="accountCategories" formControlName="accountCategoryId"
                optionLabel="name" optionValue="id" [showClear]="true" placeholder="Select or type to add"
                class="w-full" appendTo="body" [filter]="true"
            (onFilter)="filterCategories($event)">
            <ng-template pTemplate="footer">
                @if (isNewCategory()) {
                <div class="p-2 border-top-1 surface-border">
                    <p-button label="Create '{{ currentFilter }}'" class="p-button-link"
                        (onClick)="addNewCategory()"></p-button>
                </div>
                }
            </ng-template>
          </p-select>
  </div>
  
  <div class="flex justify-content-end mt-4 gap-2">
    <p-button label="Cancel" severity="secondary" (onClick)="ref.close()"></p-button>
    <p-button label="Save" type="submit" class="ml-2" [disabled]="accountForm.invalid"></p-button>
  </div>
</form>
