<div class="flex justify-content-center align-items-center h-screen">
  <p-card header="Register" [style]="{width: '360px'}">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" pInputText formControlName="userName" class="w-full" />
      </div>
      <div class="field mt-3">
        <label for="email">Email</label>
        <input id="email" type="email" pInputText formControlName="email" class="w-full" />
      </div>
      <div class="field mt-3">
        <label for="password">Password</label>
        <p-password id="password" formControlName="password" [feedback]="false" class="w-full"></p-password>
      </div>
      <p-button label="Register" type="submit" class="w-full mt-4" [disabled]="registerForm.invalid"></p-button>
      <div class="mt-3 text-center">
        <a routerLink="/login">Already have an account? Login</a>
      </div>
    </form>
  </p-card>
</div>
