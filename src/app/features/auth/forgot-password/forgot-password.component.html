<p-toast></p-toast>
<div class="auth-background">
  <div class="glass-container">
    <div class="auth-header zoom-in">
      <h1>Forgot Password</h1>
      <p>Enter your email address to receive a password reset link.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-column gap-3 fade-in">

      <div class="flex flex-column gap-2">
        <label for="email">Email Address</label>
        <input pInputText id="email" formControlName="email" class="w-full" placeholder="email@example.com" />
        @if (form.get('email')?.dirty && form.get('email')?.invalid) {
          <small class="p-error">Please enter a
            valid
          email.</small>
        }
      </div>

      <div class="mt-2">
        <p-button label="Send Reset Link" type="submit" [loading]="isSubmitting" [disabled]="form.invalid"
        styleClass="w-full"></p-button>
      </div>

      <div class="text-center mt-3 flex justify-content-center">
        <a routerLink="/login"
          class="no-underline text-400 hover:text-white transition-colors transition-duration-300">Back to
        Login</a>
      </div>
    </form>
  </div>
</div>
