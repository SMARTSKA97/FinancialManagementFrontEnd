<p-toast></p-toast>
<p-card header="Change Password" [style]="{ width: '400px' }">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-column gap-3">

    <div class="flex flex-column gap-2">
      <label for="currentPassword">Current Password</label>
      <p-password id="currentPassword" formControlName="currentPassword" [feedback]="false" [toggleMask]="true"
        styleClass="w-full"></p-password>
    </div>

    <div class="flex flex-column gap-2">
      <label for="newPassword">New Password</label>
      <p-password id="newPassword" formControlName="newPassword" [toggleMask]="true" styleClass="w-full"></p-password>
    </div>

    <div class="flex flex-column gap-2">
      <label for="confirmPassword">Confirm New Password</label>
      <p-password id="confirmPassword" formControlName="confirmPassword" [feedback]="false" [toggleMask]="true"
        styleClass="w-full"
        [ngClass]="{'ng-invalid ng-dirty': form.hasError('mismatch') && form.get('confirmPassword')?.touched}"></p-password>
      @if (form.hasError('mismatch') && form.get('confirmPassword')?.touched) {
      <small class="p-error">Passwords
        do not match.</small>
      }
    </div>

    <div class="mt-2">
      <p-button label="Change Password" type="submit" [loading]="isSubmitting" [disabled]="form.invalid"
        styleClass="w-full"></p-button>
    </div>

    <div class="text-center mt-2">
      <a routerLink="/app/dashboard" class="no-underline text-primary">Back to Dashboard</a>
    </div>
  </form>
</p-card>
