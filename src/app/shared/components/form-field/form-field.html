<div class="field flex flex-column gap-1">
    @if (label) {
    <label [for]="inputId" class="font-medium text-sm text-secondary">{{ label }}</label>
    }
    <ng-content></ng-content>
    @if (control?.invalid && (control?.touched || control?.dirty)) {
    <small class="p-error block" style="line-height: inherit;">
        {{ errorMessage }}
    </small>
    }
</div>
