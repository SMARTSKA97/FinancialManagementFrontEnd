<div class="layout-wrapper min-h-screen flex flex-column">
  <!-- Header -->
  <div class="layout-wrapper min-h-screen flex flex-column">
    <!-- Header -->
    <header
      class="p-3 surface-0 border-bottom-1 surface-border flex align-items-center justify-content-between sticky top-0 z-5">
      <div class="flex align-items-center">
        <p-button icon="pi pi-bars" styleClass="p-button-text" (onClick)="sidebarVisible = true"></p-button>
        <a routerLink="/accounts" class="no-underline">
          <h2 class="ml-2 my-0 text-primary">Financial Planner v{{ appVersion }}</h2>
        </a>
      </div>

      <div class="flex align-items-center gap-3">
        <!-- Theme Toggle Button -->
        <p-button [icon]="themeService.getCurrentTheme() === 'light' ? 'pi pi-moon' : 'pi pi-sun'"
          styleClass="p-button-text p-button-rounded" (onClick)="themeService.toggleTheme()">
        </p-button>

        <!-- User Profile Section with Async Pipe -->
        @if(authService.currentUser$ | async; as userName) {
        <div class="flex align-items-center gap-3">
          <p-avatar [label]="(userInitials$ | async)!" styleClass="bg-primary text-white" shape="circle"
            (click)="op.toggle($event)"></p-avatar>

          <p-popover #op>
            <div class="flex flex-column gap-3 w-15rem">
              <div class="flex flex-column">
                <span class="font-bold">{{ userName }}</span>
                @if(authService.currentUserEmail$ | async; as userEmail) {
                <span class="text-sm text-color-secondary">{{ userEmail }}</span>
                }
              </div>
              <hr class="my-1" />
              <div class="flex flex-column gap-2 text-sm">
                <div class="flex align-items-center gap-2">
                  <i class="pi pi-clock"></i>
                  <span>Session expires in {{ authService.sessionExpiresIn$ | async }}</span>
                </div>
              </div>
              <p-button label="Logout" icon="pi pi-sign-out" styleClass="p-button-danger p-button-sm mt-2"
                (onClick)="logout()"></p-button>
            </div>
          </p-popover>
        </div>
        }
      </div>
    </header>


    <!-- Sidebar -->
    <p-drawer [(visible)]="sidebarVisible">
      <ng-template pTemplate="header">
        <h3 class="p-3 my-0">Menu</h3>
      </ng-template>
      <ng-template pTemplate="content">
        <div class="flex-grow-1">
          <p-menu [model]="navItems" styleClass="w-full"></p-menu>
        </div>
      </ng-template>
      <ng-template pTemplate="footer">
        <div class="p-3 mt-auto border-top-1 surface-border">
          <span class="text-sm text-color-secondary">Version {{ appVersion }}</span>
        </div>
      </ng-template>
    </p-drawer>

    <!-- Main Content Area -->
    <div class="layout-main flex-grow-1">
      <main class="p-3 md:p-5">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
